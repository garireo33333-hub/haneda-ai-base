<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>運送業オールインワン Bot — デモ</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
    background: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  .demo-label {
    background: #222;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .demo-desc {
    font-size: 12px;
    color: #666;
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    background: #fff;
    border-radius: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 820px;
  }

  /* Header */
  .line-header {
    background: #06C755;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .line-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .line-name { flex: 1; color: white; font-weight: 700; font-size: 15px; }
  .line-name small { display: block; font-size: 11px; font-weight: 400; opacity: 0.85; }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    background: #c8e6f5;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .msg-row.show { opacity: 1; transform: translateY(0); }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #06C755;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .msg-bubble {
    max-width: 74%;
    padding: 10px 13px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
  }

  .msg-row:not(.user) .msg-bubble {
    background: white;
    border-bottom-left-radius: 4px;
    color: #222;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }

  .msg-row.user .msg-bubble {
    background: #06C755;
    border-bottom-right-radius: 4px;
    color: white;
  }

  .msg-time {
    font-size: 10px;
    color: #888;
    align-self: flex-end;
    white-space: nowrap;
    margin-bottom: 2px;
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 2px 12px 2px 48px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .quick-replies.show { opacity: 1; transform: translateY(0); }

  .qr-btn {
    background: white;
    border: 1.5px solid #06C755;
    border-radius: 20px;
    color: #06C755;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qr-btn:hover { background: #06C755; color: white; }
  .qr-btn:disabled { opacity: 0.35; cursor: not-allowed; background: white; color: #06C755; }

  /* Divider */
  .time-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .time-divider.show { opacity: 1; }
  .time-divider::before, .time-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(0,0,0,0.15);
  }
  .time-divider span {
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  /* Time skip button */
  .timeskip-wrap {
    display: flex;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .timeskip-wrap.show { opacity: 1; }

  .timeskip-btn {
    background: #fff;
    border: 1.5px dashed #aaa;
    border-radius: 20px;
    color: #555;
    font-size: 12px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timeskip-btn:hover { border-color: #06C755; color: #06C755; }

  /* Input area */
  .line-input-area {
    background: #f5f5f5;
    border-top: 1px solid #ddd;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .line-input {
    flex: 1;
    background: white;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .line-input:focus { border-color: #06C755; }

  .line-send {
    width: 38px;
    height: 38px;
    background: #06C755;
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .line-send:hover { opacity: 0.85; }

  /* Report card */
  .report-card {
    background: white;
    border-radius: 12px;
    border: 1px solid #e8e8e8;
    overflow: hidden;
    width: 100%;
    max-width: 260px;
  }
  .report-card-header {
    background: #06C755;
    color: white;
    padding: 9px 13px;
    font-weight: 700;
    font-size: 12px;
  }
  .report-card-body { padding: 10px 13px; }
  .report-row {
    display: flex;
    border-bottom: 1px solid #f0f0f0;
    padding: 5px 0;
    font-size: 12px;
  }
  .report-row:last-child { border-bottom: none; }
  .report-label { color: #888; width: 80px; flex-shrink: 0; }
  .report-val { color: #222; flex: 1; }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #06C75515;
    border: 1px solid #06C75544;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #05a847;
    font-weight: 600;
    width: 100%;
    max-width: 260px;
  }

  /* Typing */
  .typing {
    display: flex;
    gap: 4px;
    padding: 10px 13px;
    background: white;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .typing span {
    width: 7px; height: 7px;
    background: #bbb;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .restart-btn {
    margin-top: 16px;
    background: #444;
    border: none;
    border-radius: 20px;
    color: white;
    font-size: 13px;
    padding: 9px 22px;
    cursor: pointer;
    opacity: 0.75;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 1; }
</style>
</head>
<body>

<div class="demo-label">HANEDA AI BASE — 運送業オールインワン Bot デモ</div>
<p class="demo-desc">朝の点呼〜アルコールチェック〜夕方の日報まで<br>LINE ひとつで完結するイメージです</p>

<div class="phone">
  <div class="line-header">
    <div class="line-avatar">🚛</div>
    <div class="line-name">
      運送業務アシスタント
      <small>HANEDA AI BASE</small>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="line-input-area">
    <input class="line-input" id="textInput" placeholder="メッセージを入力..." disabled />
    <button class="line-send" id="sendBtn" disabled onclick="sendText()">➤</button>
  </div>
</div>

<button class="restart-btn" onclick="restart()">🔄 最初からやり直す</button>

<script>
const chat = document.getElementById('chat');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
let awaitingText = null;
const state = {};

function now(offsetMin = 0) {
  const d = new Date();
  d.setMinutes(d.getMinutes() + offsetMin);
  return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

function scrollBottom() {
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 60);
}

function addBotMsg(html, delay = 0) {
  return new Promise(resolve => {
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row show';
    typingRow.innerHTML = `<div class="msg-avatar">🚛</div><div class="typing"><span></span><span></span><span></span></div>`;
    setTimeout(() => {
      chat.appendChild(typingRow);
      scrollBottom();
      setTimeout(() => {
        typingRow.remove();
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `
          <div class="msg-avatar">🚛</div>
          <div class="msg-bubble">${html}</div>
          <div class="msg-time">${now()}</div>`;
        chat.appendChild(row);
        requestAnimationFrame(() => row.classList.add('show'));
        scrollBottom();
        resolve();
      }, 700);
    }, delay);
  });
}

function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-time">${now()}</div><div class="msg-bubble">${text}</div>`;
  chat.appendChild(row);
  requestAnimationFrame(() => row.classList.add('show'));
  scrollBottom();
}

function addCard(headerText, rows) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  const rowsHtml = rows.map(([l, v]) => `<div class="report-row"><div class="report-label">${l}</div><div class="report-val">${v}</div></div>`).join('');
  row.innerHTML = `
    <div class="msg-avatar">🚛</div>
    <div>
      <div class="report-card">
        <div class="report-card-header">${headerText}</div>
        <div class="report-card-body">${rowsHtml}</div>
      </div>
    </div>`;
  chat.appendChild(row);
  requestAnimationFrame(() => row.classList.add('show'));
  scrollBottom();
}

function addStatusBadge(text) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar">🚛</div>
    <div class="status-badge">✅ ${text}</div>`;
  chat.appendChild(row);
  requestAnimationFrame(() => row.classList.add('show'));
  scrollBottom();
}

function addDivider(text) {
  return new Promise(resolve => {
    const el = document.createElement('div');
    el.className = 'time-divider';
    el.innerHTML = `<span>${text}</span>`;
    chat.appendChild(el);
    setTimeout(() => { el.classList.add('show'); resolve(); }, 100);
    scrollBottom();
  });
}

function addQuickReplies(buttons, onSelect) {
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  buttons.forEach(({ label, value }) => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = label;
    btn.onclick = () => {
      wrap.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
      addUserMsg(label);
      wrap.remove();
      setTimeout(() => onSelect(value || label), 300);
    };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  requestAnimationFrame(() => wrap.classList.add('show'));
  scrollBottom();
}

function enableText(placeholder, cb) {
  textInput.placeholder = placeholder;
  textInput.disabled = false;
  textInput.value = '';
  sendBtn.disabled = false;
  textInput.focus();
  awaitingText = cb;
}

function disableText() {
  textInput.disabled = true;
  sendBtn.disabled = true;
  textInput.placeholder = 'メッセージを入力...';
  awaitingText = null;
}

function sendText() {
  const val = textInput.value.trim();
  if (!val || !awaitingText) return;
  const cb = awaitingText;
  disableText();
  addUserMsg(val);
  setTimeout(() => cb(val), 300);
}

textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });

// =========================================
// 朝のフロー
// =========================================
async function startMorning() {
  await addBotMsg('おはようございます！🌅<br>出勤前の確認をします。');
  await addBotMsg('アルコールチェックの結果を入力してください。<br><small style="color:#888">（検知器の数値をそのまま入力）</small>');
  enableText('例: 0.00', async (v) => {
    state.alc = v;
    const ok = parseFloat(v) === 0;
    if (ok) {
      await addBotMsg('✅ 基準値以下を確認しました。');
    } else {
      await addBotMsg('⚠️ 数値を確認しました。管理者に通知します。');
    }
    await askCondition();
  });
}

async function askCondition() {
  await addBotMsg('本日の体調はいかがですか？');
  addQuickReplies([
    { label: '😊 良好' },
    { label: '😐 やや不調' },
    { label: '😷 不調' },
  ], async (v) => {
    state.condition = v;
    if (v.includes('不調')) {
      await addBotMsg('体調不良とのこと、管理者に報告します。<br>無理せず相談してください。');
    }
    await askAttend();
  });
}

async function askAttend() {
  await addBotMsg('出勤打刻しますか？');
  addQuickReplies([{ label: '✅ 出勤する' }], async () => {
    state.startTime = now();
    addCard('🟢 出勤記録', [
      ['氏名', '田中 一郎'],
      ['出勤時刻', state.startTime],
      ['アルコール', state.alc + ' mg/L'],
      ['体調', state.condition],
    ]);
    await new Promise(r => setTimeout(r, 400));
    addStatusBadge('管理者に通知しました');
    await new Promise(r => setTimeout(r, 600));
    await addBotMsg('行ってらっしゃい！🚛<br>安全運転でお願いします。');
    await showTimeskip();
  });
}

// =========================================
// タイムスキップ
// =========================================
async function showTimeskip() {
  await new Promise(r => setTimeout(r, 800));
  const wrap = document.createElement('div');
  wrap.className = 'timeskip-wrap';
  const btn = document.createElement('button');
  btn.className = 'timeskip-btn';
  btn.textContent = '⏩ 夕方になりました（タップで日報入力へ）';
  btn.onclick = async () => {
    wrap.remove();
    await addDivider('── 18:30 帰社 ──');
    await startEvening();
  };
  wrap.appendChild(btn);
  chat.appendChild(wrap);
  setTimeout(() => wrap.classList.add('show'), 100);
  scrollBottom();
}

// =========================================
// 夕方のフロー（日報）
// =========================================
async function startEvening() {
  await addBotMsg('おかえりなさい！🏠<br>お疲れ様でした。日報を入力します。');
  await addBotMsg('本日の配送件数は何件ですか？');
  enableText('例: 5', async (v) => {
    state.count = v;
    await addBotMsg('走行距離（km）を入力してください。');
    enableText('例: 142', async (v2) => {
      state.km = v2;
      await addBotMsg('給油はしましたか？');
      addQuickReplies([
        { label: '⛽ した' },
        { label: 'していない' },
      ], async (v3) => {
        state.fuel = v3.includes('した') ? 'あり' : 'なし';
        await addBotMsg('事故・トラブルはありましたか？');
        addQuickReplies([
          { label: '✅ なし' },
          { label: '⚠️ あり' },
        ], async (v4) => {
          if (v4.includes('あり')) {
            await addBotMsg('内容を入力してください。');
            enableText('例: 2件目で搬入に30分かかった', async (v5) => {
              state.trouble = v5;
              await finishEvening();
            });
          } else {
            state.trouble = 'なし';
            await finishEvening();
          }
        });
      });
    });
  });
}

async function finishEvening() {
  await addBotMsg('日報を作成しています… ⏳');
  await new Promise(r => setTimeout(r, 1000));

  const today = new Date();
  const dateStr = `${today.getMonth()+1}/${today.getDate()}`;
  addCard(`📋 運転日報 — ${dateStr}`, [
    ['配送件数', state.count + ' 件'],
    ['走行距離', state.km + ' km'],
    ['給油', state.fuel],
    ['トラブル', state.trouble],
  ]);

  await new Promise(r => setTimeout(r, 400));
  await addBotMsg('日報が完成しました ✅<br>退勤打刻して送信しますか？');
  addQuickReplies([
    { label: '✅ 送信して退勤' },
    { label: '✏️ 修正する' },
  ], async (v) => {
    if (v.includes('送信')) {
      state.endTime = now();
      addCard('🔴 退勤記録', [
        ['氏名', '田中 一郎'],
        ['退勤時刻', state.endTime],
        ['勤務時間', '約8時間'],
      ]);
      await new Promise(r => setTimeout(r, 400));
      addStatusBadge('日報・退勤を管理者に送信 / スプレッドシートに記録しました');
      await new Promise(r => setTimeout(r, 500));
      await addBotMsg('お疲れ様でした！🎉<br>ゆっくり休んでください。');
    } else {
      await addBotMsg('修正内容を入力してください。');
      enableText('修正内容を入力...', async () => {
        await addBotMsg('修正して送信しました ✅<br>お疲れ様でした！');
      });
    }
  });
}

function restart() {
  chat.innerHTML = '';
  disableText();
  Object.keys(state).forEach(k => delete state[k]);
  startMorning();
}

startMorning();
</script>
</body>
</html>
